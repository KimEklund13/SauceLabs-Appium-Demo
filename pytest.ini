[pytest]
# These markers let us tag tests and run subsets:
#   pytest -m android   → only Android tests
#   pytest -m ios       → only iOS tests
markers =
    android: marks tests to run on Android only
    ios: marks tests to run on iOS only

# -v for verbose output so you can see each test name pass/fail in the terminal
# --tb=short so tracebacks don't bury the actual failure message
addopts = -v --tb=short

# Print log output live in the terminal as the test runs, not just on failure.
# This is invaluable when watching Appium drive the device — you can follow along.
log_cli = true
log_cli_level = INFO
